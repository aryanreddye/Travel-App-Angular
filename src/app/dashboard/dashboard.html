<mat-toolbar>

  <button mat-icon-button>
    <mat-icon>menu</mat-icon>
  </button>

  <span class="toolbar-title">Travel Dashboard</span>

</mat-toolbar>

<div class="dashboard">

  <div class="card-container">

    <mat-card class="dashboard-card">

      <img src="flight.avif" alt="flight">

      <div class="card-overlay">

        <div class="hover-text">
          <h3>Flights</h3>
          <p>Plan your next adventure</p>
        </div>
        <mat-icon>flight</mat-icon>
      </div>
    </mat-card>

    <mat-card class="dashboard-card">

      <img src="hotel.webp" alt="hotel">

      <div class="card-overlay">

        <div class="hover-text">
          <h3>Hotels</h3>
          <p>Luxury Stay, Luxury Comfort</p>
        </div>
        <mat-icon>hotel</mat-icon>
      </div>
    </mat-card>

    <mat-card class="dashboard-card">

      <img src="trains.webp" alt="train">

      <div class="card-overlay">

        <div class="hover-text">
          <h3>Trains</h3>
          <p>Travel Across Cities</p>
        </div>
        <mat-icon>train</mat-icon>
      </div>
    </mat-card>
  </div>
</div>
